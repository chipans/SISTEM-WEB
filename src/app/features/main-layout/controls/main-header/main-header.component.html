@if (isLoading()) {
<div
  class="flex items-center justify-between h-16 w-full px-2 bg-fondo-ligBlue border-b-[0.5px] md:px-5 drop-shadow-sm border-primay-900 realtive z-30 dark:bg-gray-900 dark:text-neutral animate-pulse">
  <div class="flex gap-4">
    <div class="flex items-center gap-2 lg:gap-5">
      <div class="w-5 h-5 bg-gray-300 rounded dark:bg-gray-700"></div>
      <div class="w-12 h-6 bg-gra-200 rounded lg:w-20 drak:bg-gray-700"></div>
    </div>
    <div class="flex flex-col">
      <div class="hidden w-40 h-4 bggray-300 rounded md:block dark:bg-gray-700"></div>
      <div class="hidden w-24 h-3 mt-1 bg-gray-200 rounded md:block dark:bg-gray-600"></div>
    </div>
  </div>

  <div class="relative flex gap-4 md:gap-10">
    <div class="w-8 h-8 bg-gray-300 rounded-full dark:bg-gray-700"></div>
    <div class="realtive z-40 dropdown-container">
      <div
        class="flex items-center justify-center gap-2 px-3 py-1 border-[1px rounded-lg] rounded-lg bg-gray-200 dark:gray-700 w-28 h-8">
      </div>
    </div>
    <div class="flex gap-4">
      <div class="w-8 h-8 border-[1px] border-gray-300 shadow-sm rounded-full bg-gray-200 dark:bg-gray-800"></div>
      <div class="flex-col hidden gap1 lg:flex">
        <div class="w-24 h-4 bg-gray-300 rounded dark:bg-gray-700"></div>
        <div class="w-16 h-3 bg-gray-200 rounded dark:bg-gray-600"></div>
      </div>
      <div class="w-8 h-8 bg-gray-700 rounded dark:bg-gray-700"></div>
    </div>
  </div>
</div>
}@else {
<div
  class="flex items-center justify-between w-full h-16 px-2 bg-slate-200 border-b-[0.5px] md:px-5 drop-shadow-sm border-primary-900 relative z-30 dark:bg-gray-900 dark:text-reutral-100">
  <div class="flex gap-4">
    <div class="flex items-center gap-2 lg:gap-5">
      <!-- <svg-icon 
        class="flex w-5 cursor-pointer group-hover:text-yellow-300 text-secondary"
        src="assets/icons/icon-hamburguesa.svg" 
        (click)="OputMenu()">
      </svg-icon> -->
      <svg-icon 
        class=" flex w-12 cursor-pointer lg:w-20 group-hover:text-yellow-300 drop-shadow-md text-secondary"
        src="assets/icons/icon-uab.svg">
      </svg-icon>
    </div>

    <div class="flex flex-col">
      <h1 class="hidden text-base leading-none select-none md:block text-secondary">
        {{ institution }}
      </h1>
      <span class="hidden text-xs leading-none select-none md:block font-primaryRegular text-tertiary">
        {{ operation }}
      </span>
    </div>
  </div>
  <div class="relative flex gap-4 md:gap-10">
    <button 
      class="left-0 flex items-center justify-center w-8 h-8 transition-transform duration-300 transform bg-white rounded-full shadow-mb min-w-8 min-h-8 dark:bg-gray-900"
      (click)="toggleDarkMode()">
      @if (!isDarkMode){
        <svg-icon class="flex w-4 text-blue-700" src="assets/icons/icon-luna.svg"></svg-icon>
      }@else {
        <svg-icon class="flex w-4 text-yellow-500" src="assets/icons/icon-sol.svg"></svg-icon>
      }
    </button>

    <div id="userProfile" class="realtive z-50 dropdown-container group">
      <div class="flex items-center gap-3 cursor-pointer userProfileButton">
        <div class="flex items-center justify-center relative w-8 h-8 transition-shadow duration-300 bg-white border-[0.5px rounded-full border-blue-100 group-hover:shadow-lg]">
          <div class="absolute inset-0 transition-trasform duration-300 rounded-full ring-2 ring-primary-300 opacity-30 grop-hover:scale-105"></div>
          <div class="flex items-center justify-center w-[85%] w-[85%] rounded-full bg-gray-100">
            <svg-icon class="w-5 h-5 text-primary-700 text-secondary" src="assets/icons/icon-person.svg"></svg-icon>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
}
