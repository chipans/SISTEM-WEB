<div class="toast-container {{ type }} fixed z-[9999] left-2 right-2 top-2 sm:left-auto sm:right-0 sm:top-[70px] sm:w-[400px] p-2.5 sm:p-5 rounded-lg sm:rounded">
  <div class="flex items-center justify-start w-full gap-2 sm:gap-4">
    <div>
      <svg-icon
        class="toast-icon flex w-4 h-4 sm:w-6 sm:h-6 shrink-0"
        src="{{ icon }}"
        (click)="close()">
      </svg-icon>
    </div>
    <div class="toast-content flex flex-col gap-0.5 sm:gap-1 flex-1 min-w-0 pointer-events-none">
      <h4 class="toast-title text-[13px] sm:text-base leading-tight m-0">
        {{ title }}
      </h4>
      <p class="toast-message text-[11px] sm:text-sm leading-tight m-0 break-words">
        {{ message }}
      </p>
      <div class="toast-actions flex flex-wrap gap-2 mt-1 pointer-events-auto" *ngIf="actions.length > 0">
        <button *ngFor="let action of actions"
          class="toast-action-button text-[11px] sm:text-sm px-2 py-0.5 sm:px-3 sm:py-1.5"
          (click)="action.handler($event); $event.stopPropagation()">
          {{ action.text }}
        </button>
      </div>
    </div>
    <div>
      <svg-icon
        class="toast-close-btn flex w-3 h-3 sm:w-4 sm:h-4 shrink-0 cursor-pointer ml-auto"
        src="/assets/icons/icon-close.svg"
        (click)="close()">
      </svg-icon>
    </div>
  </div>
</div>
